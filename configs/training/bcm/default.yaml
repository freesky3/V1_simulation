steady_state_abs_tol: 1.0e-3
steady_state_rel_tol: 1.0e-5
steady_state_window: 5
steady_state_min_tau: 5.0
require_steady_state: true
y_diff_max_threshold: null
dy_max_threshold: 1.0
rate_explosion_threshold: null
saturation_fraction_threshold: 0.05
active_rate_threshold: 1.0
max_consecutive_bad_batches: 5
duration_tau_e: 30.0
dt_tau_i_fraction: 0.3333333333333333
