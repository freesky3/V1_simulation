# @package solver

backend: diffrax
method: adaptive

diffrax:
  solver: heun
  steady_state_tail_points: 1

jax:
  prefer_sparse: false
  dense_max_mb: 512.0
  dtype: float32

early_stop:
  enabled: false
  min_time: 0.2
  min_steps: 20
  f_atol: 1e-4
  f_rtol: 1e-4
  norm: max
  rk4_window: 5
  only_static_input: true
