# @package solver

defaults:
  - transfer: default
  - _self_

backend: scipy
method: RK4

early_stop:
  enabled: false
  min_time: 0.2
  min_steps: 20
  f_atol: 1e-4
  f_rtol: 1e-4
  norm: max
  rk4_window: 5
  only_static_input: true

diagnostics:
  enabled: true
  probe_dt: 1.0
  eval_dy_at: mean
  variables: exc
  trajectory_sample_points: 2000
  convergence_window_s: 1.0
  dy_dt_threshold: 1.0
  peak_to_peak_threshold: 0.05
